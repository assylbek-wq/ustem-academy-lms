<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USTEM Academy — Post editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <!-- Quill -->
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.min.js"></script>
  <style>
    .editor-section { background: white; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 1.5rem; }
    .lang-tab { padding: .5rem 1rem; border-radius: .5rem; font-weight: 600; font-size: .875rem; transition: all .15s; display: flex; align-items: center; gap: .5rem; cursor: pointer; border: none; }
    .lang-tab.active { background: linear-gradient(135deg,#6d28d9,#2563eb); color: white; box-shadow: 0 4px 12px -2px rgba(109,40,217,.4); }
    .lang-tab:not(.active) { background: #f1f5f9; color: #475569; }
    .lang-tab:not(.active):hover { background: #e2e8f0; }
    .lang-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .lang-dot.complete { background: #10b981; }
    .lang-dot.partial { background: #f59e0b; }
    .lang-dot.empty { background: #ef4444; }
    .ql-editor { min-height: 360px; max-height: 640px; font-family: 'Inter', sans-serif; font-size: 1rem; line-height: 1.7; }
    .ql-editor h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; margin-top: 1.25rem; margin-bottom: 0.5rem; }
    .ql-editor h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; }
    .ql-editor pre, .ql-editor pre.ql-syntax { background: #0f172a; color: #e2e8f0; padding: 1rem; border-radius: .5rem; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
    .ql-editor .callout { display: flex; gap: 0.75rem; padding: 1rem 1.25rem; border-radius: 0.75rem; background: linear-gradient(135deg, #f5f3ff, #eff6ff); border: 1px solid #ddd6fe; margin: 1rem 0; }
    .ql-editor .callout.warning { background: linear-gradient(135deg, #fef3c7, #fce7f3); border-color: #fcd34d; }
    .ql-editor iframe { width: 100%; aspect-ratio: 16/9; border: 0; border-radius: .5rem; }
    .ql-editor img { max-width: 100%; height: auto; border-radius: .5rem; }
    .ql-editor table { width: 100%; border-collapse: collapse; }
    .ql-editor table th, .ql-editor table td { border: 1px solid #e2e8f0; padding: 8px 12px; }
    .ql-toolbar.ql-snow { border-radius: 0; background: #f8fafc; }
    .ql-callout::before { content: '💡'; font-size: 14px; }
    .ql-callout-warn::before { content: '⚠️'; font-size: 14px; }
    .templates-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; padding: 10px 12px; background: linear-gradient(135deg, #faf5ff, #eff6ff); border: 1px solid #e2e8f0; border-bottom: 0; border-radius: .5rem .5rem 0 0; }
    .templates-bar .label { font-size: 0.75rem; font-weight: 600; color: #6b21a8; margin-right: 4px; }
    .tpl-btn { padding: 4px 10px; background: white; border: 1px solid #e9d5ff; color: #6d28d9; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; cursor: pointer; transition: all .15s; }
    .tpl-btn:hover { background: #f3e8ff; border-color: #c4b5fd; }
    .status-toggle { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 9999px; font-size: 0.875rem; font-weight: 600; cursor: pointer; border: 1.5px solid transparent; }
    .status-toggle.draft { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
    .status-toggle.published { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
    .save-status { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
    .save-status.saved { background: #d1fae5; color: #065f46; }
    .save-status.unsaved { background: #fee2e2; color: #991b1b; }
    .save-status.saving { background: #fef3c7; color: #92400e; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="header-root" data-active="admin"></div>
  <main id="page-root" class="pt-24 pb-16"></main>
  <div id="footer-root"></div>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    if (!USTEM.requireAdmin()) { /* redirect */ }

    const postId = USTEM.getParam('id');
    const isNew = !postId;
    let model = null;
    let editLang = i18n.lang;
    let dirty = false;
    let quill = null;
    let lastSaved = null;

    function blankMl() { return { ru: '', kk: '', en: '' }; }

    function newPostModel() {
      return {
        id: 'p_' + Math.random().toString(36).slice(2, 10),
        slug: '',
        categoryKey: 'post.cat.announcement',
        date: new Date().toISOString(),
        author: '',
        cover: 'announcement',
        coverImage: '',
        featured: false,
        status: 'draft',
        tags: [],
        title: blankMl(),
        excerpt: blankMl(),
        body: blankMl(),
      };
    }

    function asMl(v) {
      if (typeof v === 'object' && v && ('ru' in v || 'kk' in v || 'en' in v)) {
        return { ru: v.ru || '', kk: v.kk || '', en: v.en || '' };
      }
      if (typeof v === 'string' && v) return { ru: v, kk: '', en: '' };
      return blankMl();
    }

    function loadPost() {
      if (isNew) { model = newPostModel(); return; }
      const src = Store.getPostById(postId);
      if (!src) { model = null; return; }
      model = JSON.parse(JSON.stringify(src));
      model.title = asMl(model.title);
      model.excerpt = asMl(model.excerpt);
      model.body = asMl(model.body);
      model.tags = model.tags || [];
      model.status = model.status || 'published';
      model.coverImage = model.coverImage || '';
    }

    function isFilled(v) {
      if (!v) return false;
      const stripped = String(v).replace(/<[^>]+>/g, '').trim();
      return stripped !== '';
    }

    function langStatus(lang) {
      const f = [model.title?.[lang], model.excerpt?.[lang], model.body?.[lang]];
      const filled = f.filter(isFilled).length;
      if (filled === f.length) return 'complete';
      if (filled === 0) return 'empty';
      return 'partial';
    }

    function escapeAttr(s) { return USTEM.escapeHtml(s || ''); }
    function markDirty() { dirty = true; updateSaveStatus('unsaved'); }
    function updateSaveStatus(status) {
      const el = document.getElementById('save-status');
      if (!el) return;
      el.classList.remove('saved','unsaved','saving');
      el.classList.add(status);
      if (status === 'saving') el.textContent = t('editor.autosave.saving');
      else if (status === 'saved') el.textContent = lastSaved ? `${t('editor.autosave.saved')} · ${lastSaved.toLocaleTimeString().slice(0,5)}` : t('editor.autosave.saved');
      else el.textContent = t('editor.autosave.unsaved');
    }

    function renderPage() {
      document.getElementById('header-root').innerHTML = USTEM.renderHeader('admin');
      document.getElementById('footer-root').innerHTML = USTEM.renderFooter();

      if (!model) {
        document.getElementById('page-root').innerHTML = `
          <div class="max-w-2xl mx-auto px-6 text-center py-20">
            <div class="text-6xl mb-4">🤔</div>
            <h1 class="font-display font-bold text-3xl mb-3">${t('blog.notFound.title')}</h1>
            <a href="admin-blog.html" class="btn-primary inline-flex">${t('editor.post.back')}</a>
          </div>`;
        return;
      }

      const statusClass = model.status === 'published' ? 'published' : 'draft';
      const statusLabel = model.status === 'published' ? t('editor.status.published') : t('editor.status.draft');
      const datePart = (model.date || new Date().toISOString()).slice(0, 16);

      document.getElementById('page-root').innerHTML = `
        <div class="max-w-4xl mx-auto px-4 sm:px-6">
          <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
            <div class="flex-1 min-w-0">
              <a href="admin-blog.html" onclick="return confirmLeave(event)" class="text-sm text-purple-700 hover:underline">${t('editor.post.back')}</a>
              <h1 class="font-display font-bold text-2xl lg:text-3xl mt-2 text-slate-900">${isNew ? t('editor.post.new') : t('editor.post.edit')}</h1>
            </div>
            <div class="flex items-center gap-3 flex-wrap">
              <span id="save-status" class="save-status saved">${t('editor.autosave.saved')}</span>
              <button onclick="toggleStatus()" class="status-toggle ${statusClass}">${statusLabel}</button>
              ${!isNew ? `<a href="post.html?id=${model.id}" target="_blank" class="btn-secondary text-sm">${t('editor.previewCourse')}</a>` : ''}
              <button onclick="cancel()" class="btn-secondary">${t('common.cancel')}</button>
              <button onclick="save()" class="btn-primary">💾 ${t('common.save')}</button>
            </div>
          </div>

          <!-- Lang tabs -->
          <div class="editor-section mb-5">
            <div class="flex items-center justify-between flex-wrap gap-3">
              <div class="flex gap-2">
                ${['ru','kk','en'].map(l => {
                  const s = langStatus(l);
                  const label = { ru: 'РУ', kk: 'ҚАЗ', en: 'EN' }[l];
                  return `<button onclick="switchLang('${l}')" class="lang-tab ${editLang === l ? 'active' : ''}">
                    <span class="lang-dot ${s}"></span>${label}
                  </button>`;
                }).join('')}
              </div>
              <div class="text-xs text-slate-500">${t('editor.lang.fillAll')}</div>
            </div>
          </div>

          <!-- Title + excerpt -->
          <section class="editor-section mb-5">
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">${t('editor.field.title')}</label>
                <input id="f-title" class="input text-lg font-display font-semibold" value="${escapeAttr(model.title[editLang])}" oninput="model.title[editLang]=this.value; markDirty(); updateLangDots()" placeholder="Заголовок поста..." />
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">${t('editor.post.field.excerpt')}</label>
                <textarea id="f-excerpt" class="input" rows="2" oninput="model.excerpt[editLang]=this.value; markDirty(); updateLangDots()" placeholder="Краткое описание — будет показано на карточке поста и в анонсе">${USTEM.escapeHtml(model.excerpt[editLang])}</textarea>
              </div>
            </div>
          </section>

          <!-- Body (Quill) -->
          <section class="editor-section mb-5">
            <label class="block text-sm font-medium text-slate-700 mb-2">${t('editor.post.field.body')}</label>
            <div class="templates-bar">
              <span class="label">${t('editor.tools.label')}</span>
              <button type="button" class="tpl-btn" onclick="insertTemplate('intro')">${t('editor.tools.intro')}</button>
              <button type="button" class="tpl-btn" onclick="insertTemplate('tip')">${t('editor.tools.tip')}</button>
              <button type="button" class="tpl-btn" onclick="insertTemplate('warning')">${t('editor.tools.warning')}</button>
              <button type="button" class="tpl-btn" onclick="insertTemplate('table')">${t('editor.tools.table')}</button>
              <button type="button" class="tpl-btn" onclick="insertTemplate('code')">${t('editor.tools.code')}</button>
              <button type="button" class="tpl-btn" onclick="insertTemplate('video')">${t('editor.tools.video')}</button>
              <button type="button" class="tpl-btn" onclick="insertTemplate('image')">${t('editor.tools.image')}</button>
              <button type="button" class="tpl-btn" onclick="insertTemplate('attachment')">${t('editor.tools.attachment')}</button>
              <button type="button" class="tpl-btn" onclick="insertTemplate('divider')">${t('editor.tools.divider')}</button>
            </div>
            <div id="quill-editor"></div>
          </section>

          <!-- Meta -->
          <section class="editor-section mb-5">
            <h2 class="font-display font-semibold text-lg mb-4">⚙️ Параметры поста</h2>
            <div class="grid sm:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">${t('editor.post.field.category')}</label>
                <select class="input" onchange="model.categoryKey=this.value; markDirty()">
                  ${['post.cat.announcement','post.cat.update','post.cat.event','post.cat.story','post.cat.news'].map(c => `<option value="${c}" ${model.categoryKey===c?'selected':''}>${t(c)}</option>`).join('')}
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">${t('editor.post.field.cover')}</label>
                <select class="input" onchange="model.cover=this.value; markDirty()">
                  ${['announcement','update','event','story','news'].map(c => `<option value="${c}" ${model.cover===c?'selected':''}>${USTEM.CoverIcons[c]} ${c}</option>`).join('')}
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">${t('editor.post.field.author')}</label>
                <input class="input" value="${escapeAttr(model.author)}" oninput="model.author=this.value; markDirty()" placeholder="Имя автора" />
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">${t('editor.post.field.date')}</label>
                <input type="datetime-local" class="input" value="${escapeAttr(datePart)}" oninput="model.date=new Date(this.value).toISOString(); markDirty()" />
              </div>
              <div class="sm:col-span-2">
                <label class="block text-sm font-medium text-slate-700 mb-1.5">${t('editor.post.field.coverImage')}</label>
                <input class="input font-mono text-sm" value="${escapeAttr(model.coverImage)}" oninput="model.coverImage=this.value; markDirty()" placeholder="https://example.com/image.jpg" />
                <div class="text-xs text-slate-400 mt-1">Если указано — будет фоном на странице поста и карточке. Иначе — градиент по категории.</div>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">URL-slug</label>
                <input class="input font-mono text-sm" value="${escapeAttr(model.slug)}" oninput="model.slug=this.value; markDirty()" placeholder="auto-generated-from-title" />
              </div>
              <div class="flex items-end">
                <label class="flex items-center gap-2 text-sm cursor-pointer pb-3">
                  <input type="checkbox" ${model.featured?'checked':''} onchange="model.featured=this.checked; markDirty()" class="w-4 h-4" />
                  <span>${t('editor.post.field.featured')}</span>
                </label>
              </div>
              <div class="sm:col-span-2">
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Теги (через запятую)</label>
                <input class="input" value="${escapeAttr((model.tags || []).join(', '))}" oninput="model.tags=this.value.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean); markDirty()" placeholder="announcement, scholarship" />
              </div>
            </div>
          </section>

          <div class="flex justify-end gap-2 sticky bottom-4">
            <button onclick="cancel()" class="btn-secondary shadow">${t('common.cancel')}</button>
            <button onclick="save()" class="btn-primary shadow">💾 ${t('common.save')}</button>
          </div>
        </div>
      `;
      i18n.apply();
      initQuill();
    }

    function initQuill() {
      const content = model.body[editLang] || '';
      quill = new Quill('#quill-editor', {
        theme: 'snow',
        placeholder: 'Текст поста…',
        modules: {
          toolbar: {
            container: [
              [{ header: [2, 3, 4, false] }],
              ['bold', 'italic', 'underline', 'strike'],
              [{ color: [] }, { background: [] }],
              [{ list: 'ordered' }, { list: 'bullet' }],
              [{ align: [] }],
              ['blockquote', 'code-block'],
              ['link', 'image', 'video'],
              ['callout', 'callout-warn'],
              ['clean'],
            ],
            handlers: {
              callout: () => insertCallout(false),
              'callout-warn': () => insertCallout(true),
              image: () => insertImageSmart(),
              video: () => insertVideoSmart(),
            },
          },
        },
      });
      if (content) quill.root.innerHTML = content;
      quill.on('text-change', () => {
        model.body[editLang] = quill.root.innerHTML;
        markDirty();
        updateLangDots();
      });

      // Drag-drop images
      quill.container.addEventListener('dragover', e => {
        if (e.dataTransfer?.types?.includes('Files')) e.preventDefault();
      });
      quill.container.addEventListener('drop', e => {
        if (!e.dataTransfer?.files?.length) return;
        e.preventDefault();
        Array.from(e.dataTransfer.files).forEach(file => {
          if (file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = ev => {
              const range = quill.getSelection(true) || { index: quill.getLength() };
              quill.insertEmbed(range.index, 'image', ev.target.result);
            };
            reader.readAsDataURL(file);
          }
        });
      });

      // Auto-detect video URLs on paste
      quill.root.addEventListener('paste', e => {
        const text = (e.clipboardData || window.clipboardData)?.getData('text/plain');
        if (!text) return;
        const trimmed = text.trim();
        if (!/^https?:\/\/\S+$/.test(trimmed) || /\s/.test(trimmed)) return;
        const info = parseVideoUrl(trimmed);
        if (!info) return;
        e.preventDefault();
        insertVideoFromInfo(info);
        USTEM.showToast('🎬 Видео распознано и вставлено', 'success');
      });
    }

    function switchLang(lang) {
      if (quill) model.body[editLang] = quill.root.innerHTML;
      const titleEl = document.getElementById('f-title');
      const exEl = document.getElementById('f-excerpt');
      if (titleEl) model.title[editLang] = titleEl.value;
      if (exEl) model.excerpt[editLang] = exEl.value;
      editLang = lang;
      renderPage();
    }

    function updateLangDots() {
      document.querySelectorAll('.lang-tab').forEach((btn, idx) => {
        const lang = ['ru','kk','en'][idx];
        const dot = btn.querySelector('.lang-dot');
        if (dot) { dot.classList.remove('complete','partial','empty'); dot.classList.add(langStatus(lang)); }
      });
    }

    function toggleStatus() {
      model.status = model.status === 'published' ? 'draft' : 'published';
      markDirty();
      renderPage();
    }

    function getInsertIndex() {
      const range = quill.getSelection(true);
      return range ? range.index : quill.getLength();
    }
    function insertHTML(html) {
      const idx = getInsertIndex();
      quill.clipboard.dangerouslyPasteHTML(idx, html, 'user');
      setTimeout(() => quill.setSelection(idx + 1), 10);
    }
    function insertCallout(warn) {
      const cls = warn ? 'callout warning' : 'callout';
      const emoji = warn ? '⚠️' : '💡';
      insertHTML(`<div class="${cls}"><span>${emoji}</span><div><strong>${warn ? 'Важно:' : 'Совет:'}</strong> ${t('editor.callout.placeholder')}</div></div><p><br></p>`);
    }
    function insertImageSmart() {
      const url = prompt(t('editor.prompt.imageUrl'));
      if (!url) return;
      try { new URL(url); } catch { USTEM.showToast('Неверный URL', 'error'); return; }
      const alt = prompt(t('editor.prompt.imageAlt')) || '';
      const idx = getInsertIndex();
      quill.insertEmbed(idx, 'image', url);
      setTimeout(() => {
        const imgs = quill.root.querySelectorAll('img');
        const last = imgs[imgs.length - 1];
        if (last && alt) last.setAttribute('alt', alt);
      }, 50);
    }
    function parseVideoUrl(url) {
      url = (url || '').trim();
      if (!url) return null;
      let m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/|live\/|v\/)|youtu\.be\/|youtube-nocookie\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
      if (m) return { type: 'iframe', src: `https://www.youtube.com/embed/${m[1]}` };
      m = url.match(/vimeo\.com\/(?:video\/|channels\/[^/]+\/|groups\/[^/]+\/videos\/|showcase\/\d+\/video\/)?(\d+)/);
      if (m) return { type: 'iframe', src: `https://player.vimeo.com/video/${m[1]}` };
      m = url.match(/rutube\.ru\/(?:video\/private\/|video\/|play\/embed\/|shorts\/)([a-zA-Z0-9]+)/i);
      if (m) return { type: 'iframe', src: `https://rutube.ru/play/embed/${m[1]}` };
      m = url.match(/kinescope\.io\/(?:embed\/)?([a-zA-Z0-9]+)/i);
      if (m) return { type: 'iframe', src: `https://kinescope.io/embed/${m[1]}` };
      m = url.match(/vk\.com\/video(-?\d+)_(\d+)/);
      if (m) return { type: 'iframe', src: `https://vk.com/video_ext.php?oid=${m[1]}&id=${m[2]}&hd=2` };
      m = url.match(/ok\.ru\/(?:video\/|videoembed\/)(\d+)/);
      if (m) return { type: 'iframe', src: `https://ok.ru/videoembed/${m[1]}` };
      if (/\.(mp4|webm|ogv|mov|m4v)(\?|#|$)/i.test(url)) return { type: 'video', src: url };
      if (/\/embed[/?]/i.test(url)) return { type: 'iframe', src: url };
      return null;
    }
    function insertVideoFromInfo(info) {
      if (!info) return;
      if (info.type === 'iframe') {
        insertHTML(`<iframe src="${escapeAttr(info.src)}" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe><p><br></p>`);
      } else {
        insertHTML(`<video controls src="${escapeAttr(info.src)}" style="width:100%;border-radius:.5rem;margin:.75rem 0"></video><p><br></p>`);
      }
    }
    function insertVideoSmart() {
      const url = prompt(`URL видео (YouTube/Vimeo/Rutube/Kinescope/VK/OK/MP4):`);
      if (!url) return;
      const info = parseVideoUrl(url);
      if (!info) { USTEM.showToast(t('editor.prompt.videoInvalid'), 'error'); return; }
      if (location.protocol === 'file:' && /youtube|vimeo/i.test(info.src)) {
        USTEM.showToast('⚠️ Видео может не играть на file://. Запустите: python3 -m http.server 8000', 'error');
      }
      insertVideoFromInfo(info);
    }

    const TEMPLATES = {
      intro: () => `<p><strong>Кратко:</strong> о чём этот пост и почему его стоит прочитать.</p>`,
      tip: () => `<div class="callout"><span>💡</span><div><strong>Совет:</strong> Полезная информация.</div></div><p><br></p>`,
      warning: () => `<div class="callout warning"><span>⚠️</span><div><strong>Важно:</strong> На что обратить внимание.</div></div><p><br></p>`,
      table: () => `<table><thead><tr><th>Параметр</th><th>A</th><th>B</th></tr></thead><tbody><tr><td>—</td><td>—</td><td>—</td></tr></tbody></table><p><br></p>`,
      divider: () => `<hr><p><br></p>`,
    };
    function insertTemplate(name) {
      if (!quill) return;
      if (name === 'image') return insertImageSmart();
      if (name === 'video') return insertVideoSmart();
      if (name === 'attachment') {
        const url = prompt(t('editor.prompt.fileUrl'));
        if (!url) return;
        const fn = prompt(t('editor.prompt.fileName'), 'Скачать материалы') || 'Скачать';
        return insertHTML(`<p>📎 <a href="${escapeAttr(url)}" target="_blank" rel="noopener">${USTEM.escapeHtml(fn)}</a></p>`);
      }
      if (name === 'code') {
        const lang = (prompt('Язык программирования (python/javascript/cpp/java/bash/sql/html):', 'python') || '').trim().toLowerCase() || 'plaintext';
        return insertHTML(`<pre><code class="language-${lang}">// Ваш код здесь</code></pre><p><br></p>`);
      }
      const tpl = TEMPLATES[name];
      if (tpl) insertHTML(tpl());
    }

    function persist() {
      if (quill) model.body[editLang] = quill.root.innerHTML;
      const titleEl = document.getElementById('f-title');
      const exEl = document.getElementById('f-excerpt');
      if (titleEl) model.title[editLang] = titleEl.value;
      if (exEl) model.excerpt[editLang] = exEl.value;
      if (!model.slug) {
        const base = model.title.en || model.title.ru || 'post';
        model.slug = base.toLowerCase().replace(/[^\w\s-]/g,'').replace(/\s+/g,'-').slice(0, 60) || 'post-' + Math.random().toString(36).slice(2, 6);
      }
      Store.savePost(model);
      dirty = false;
      lastSaved = new Date();
      updateSaveStatus('saved');
    }

    function save() {
      if (!model.title.ru && !model.title.kk && !model.title.en) {
        USTEM.showToast(t('editor.validation.titleRequired'), 'error');
        return;
      }
      if (model.slug && !/^[a-z0-9-]+$/.test(model.slug)) {
        USTEM.showToast(t('editor.validation.slugInvalid'), 'error');
        return;
      }
      persist();
      USTEM.showToast(isNew ? 'Пост создан' : 'Пост сохранён', 'success');
      setTimeout(() => location.href = 'admin-blog.html', 600);
    }

    function cancel() {
      if (dirty && !confirm(t('editor.unsaved'))) return;
      location.href = 'admin-blog.html';
    }
    function confirmLeave(e) {
      if (dirty && !confirm(t('editor.unsaved'))) { e.preventDefault(); return false; }
      return true;
    }

    // Auto-save every 30 sec
    setInterval(() => {
      if (!dirty || !model) return;
      if (!model.title.ru && !model.title.kk && !model.title.en) return;
      updateSaveStatus('saving');
      setTimeout(() => persist(), 200);
    }, 30000);

    window.addEventListener('beforeunload', e => { if (dirty) { e.preventDefault(); e.returnValue=''; } });
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        if (model.title.ru || model.title.kk || model.title.en) {
          persist();
          USTEM.showToast(t('editor.autosave.saved'), 'success');
        }
      }
    });

    window.switchLang = switchLang;
    window.updateLangDots = updateLangDots;
    window.toggleStatus = toggleStatus;
    window.insertTemplate = insertTemplate;
    window.markDirty = markDirty;
    window.save = save;
    window.cancel = cancel;
    window.confirmLeave = confirmLeave;
    Object.defineProperty(window, 'editLang', { get: () => editLang });
    Object.defineProperty(window, 'model', { get: () => model });

    document.addEventListener('lang:change', renderPage);
    loadPost();
    if (Store.getSession()?.role === 'admin') {
      renderPage();
      updateSaveStatus('saved');
    }
  </script>
</body>
</html>
