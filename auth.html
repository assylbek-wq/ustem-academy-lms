<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="auth.title">USTEM Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="gradient-hero min-h-screen" data-title-key="auth.title">
  <div class="min-h-screen flex items-center justify-center px-6 py-12 relative overflow-hidden">
    <div class="absolute inset-0 opacity-30">
      <div class="absolute top-10 right-20 w-72 h-72 rounded-full bg-purple-500 blur-[120px] float"></div>
      <div class="absolute bottom-10 left-10 w-80 h-80 rounded-full bg-blue-500 blur-[150px] float" style="animation-delay:-2s"></div>
    </div>

    <div class="relative max-w-md w-full">
      <div class="flex items-center justify-between mb-8">
        <a href="index.html" class="flex items-center gap-3 text-white">
          <span class="brand-mark">
            <img src="assets/img/logo-symbol.png" alt="USTEM Academy" />
          </span>
          <div>
            <div class="font-display font-bold text-lg leading-none tracking-tight">USTEM</div>
            <div class="text-xs text-sky-200 leading-none mt-1" data-i18n="brand.tagline">academy</div>
          </div>
        </a>
        <div id="lang-switcher"></div>
      </div>

      <div class="bg-white rounded-2xl shadow-2xl p-8 fade-in">
        <div class="flex gap-2 p-1 bg-slate-100 rounded-xl mb-6">
          <button id="tab-login" class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition" data-i18n="auth.tab.login">Вход</button>
          <button id="tab-register" class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition" data-i18n="auth.tab.register">Регистрация</button>
        </div>

        <form id="form-login" class="space-y-4">
          <h2 class="font-display font-bold text-2xl mb-1" data-i18n="auth.login.title">С возвращением!</h2>
          <p class="text-slate-500 text-sm mb-4" data-i18n="auth.login.desc">Войдите в свой аккаунт USTEM</p>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="auth.email">Email</label>
            <input id="login-email" type="email" class="input" placeholder="student@ustem.kz" required />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="auth.password">Пароль</label>
            <input id="login-password" type="password" class="input" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn-primary w-full justify-center" data-i18n="auth.login.submit">Войти</button>
          <div class="text-center text-xs text-slate-500 pt-2">
            <div class="font-medium text-slate-600 mb-1" data-i18n="auth.demo.label">Демо-аккаунты:</div>
            <div><span data-i18n="auth.demo.student">Студент</span>: <code class="text-purple-700">student@ustem.kz</code> / <code class="text-purple-700">student123</code></div>
            <div><span data-i18n="auth.demo.admin">Админ</span>: <code class="text-purple-700">admin@ustem.kz</code> / <code class="text-purple-700">admin123</code></div>
          </div>
        </form>

        <form id="form-register" class="space-y-4 hidden">
          <h2 class="font-display font-bold text-2xl mb-1" data-i18n="auth.reg.title">Создайте аккаунт</h2>
          <p class="text-slate-500 text-sm mb-4" data-i18n="auth.reg.desc">Начните учиться бесплатно</p>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="auth.reg.name">Полное имя</label>
            <input id="reg-name" type="text" class="input" data-i18n-placeholder="auth.reg.name.placeholder" required />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="auth.email">Email</label>
            <input id="reg-email" type="email" class="input" data-i18n-placeholder="auth.reg.email.placeholder" required />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="auth.password">Пароль</label>
            <input id="reg-password" type="password" class="input" data-i18n-placeholder="auth.reg.password.placeholder" minlength="6" required />
          </div>
          <label class="flex items-start gap-2 text-sm text-slate-600">
            <input type="checkbox" required class="mt-0.5" />
            <span data-i18n="auth.reg.terms">Я согласен с условиями</span>
          </label>
          <button type="submit" class="btn-primary w-full justify-center" data-i18n="auth.reg.submit">Создать аккаунт</button>
        </form>
      </div>

      <div class="text-center mt-6 text-sm text-purple-200">
        <a href="index.html" class="hover:text-white" data-i18n="auth.backHome">← На главную</a>
      </div>
    </div>
  </div>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    const mode = USTEM.getParam('mode') === 'register' ? 'register' : 'login';
    const next = USTEM.getParam('next') || 'dashboard.html';

    const formLogin = document.getElementById('form-login');
    const formReg = document.getElementById('form-register');
    const tabLogin = document.getElementById('tab-login');
    const tabReg = document.getElementById('tab-register');

    function refreshLang() {
      document.getElementById('lang-switcher').innerHTML = USTEM.renderLangSwitcher();
      i18n.apply();
    }
    document.addEventListener('lang:change', refreshLang);
    refreshLang();

    function setMode(m) {
      if (m === 'login') {
        formLogin.classList.remove('hidden');
        formReg.classList.add('hidden');
        tabLogin.classList.add('bg-white', 'text-purple-700', 'shadow-sm');
        tabReg.classList.remove('bg-white', 'text-purple-700', 'shadow-sm');
        tabReg.classList.add('text-slate-600');
      } else {
        formReg.classList.remove('hidden');
        formLogin.classList.add('hidden');
        tabReg.classList.add('bg-white', 'text-purple-700', 'shadow-sm');
        tabLogin.classList.remove('bg-white', 'text-purple-700', 'shadow-sm');
        tabLogin.classList.add('text-slate-600');
      }
    }

    tabLogin.addEventListener('click', () => setMode('login'));
    tabReg.addEventListener('click', () => setMode('register'));
    setMode(mode);

    formLogin.addEventListener('submit', e => {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const user = Store.getUserByEmail(email);
      if (!user || user.password !== password) {
        USTEM.showToast(t('auth.invalid'), 'error');
        return;
      }
      Store.setSession(user.id);
      USTEM.showToast(`${t('auth.welcome')} ${user.name}!`, 'success');
      setTimeout(() => (location.href = next), 600);
    });

    formReg.addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      if (Store.getUserByEmail(email)) {
        USTEM.showToast(t('auth.exists'), 'error');
        return;
      }
      const user = {
        id: 'u_' + Math.random().toString(36).slice(2, 10),
        name, email, password,
        role: 'student',
        avatar: name.charAt(0).toUpperCase(),
        enrolled: [], progress: {}, quizScores: {},
        createdAt: new Date().toISOString(),
      };
      Store.saveUser(user);
      Store.setSession(user.id);
      USTEM.showToast(`${t('auth.created')} ${name}`, 'success');
      setTimeout(() => (location.href = next), 800);
    });
  </script>
</body>
</html>
